<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="image-slot.js"></script>
  <style>
    .cp-scroll::-webkit-scrollbar{ display:none; }
    .cp-input::placeholder{ color:#B4B1AA; }
  </style>
</helmet>
<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%, #F0EFEC 0%, #E8E7E3 60%, #E3E2DE 100%);font-family:'Plus Jakarta Sans',system-ui,sans-serif;padding:40px 0;box-sizing:border-box;">

  <div style="position:relative;width:392px;height:840px;background:#0B0B0C;border-radius:54px;padding:11px;box-shadow:0 50px 90px -30px rgba(20,20,25,.55), 0 0 0 2px rgba(0,0,0,.04), inset 0 0 0 2px rgba(255,255,255,.06);box-sizing:border-box;">
    <div style="position:relative;width:100%;height:100%;background:{{ bg }};border-radius:44px;overflow:hidden;display:flex;flex-direction:column;">

      <!-- status bar -->
      <div style="position:relative;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;flex-shrink:0;z-index:20;">
        <span style="font-size:15px;font-weight:600;color:{{ ink }};letter-spacing:.2px;">9:41</span>
        <div style="position:absolute;left:50%;top:11px;transform:translateX(-50%);width:118px;height:33px;background:#0B0B0C;border-radius:20px;"></div>
        <div style="display:flex;align-items:center;gap:7px;">
          <span style="display:flex;gap:2px;align-items:flex-end;height:11px;">
            <i style="width:3px;height:5px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:7px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:9px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:11px;background:{{ ink }};border-radius:1px;display:block;"></i>
          </span>
          <span style="display:inline-flex;align-items:center;"><i style="width:23px;height:11px;border:1.5px solid {{ ink }};border-radius:3px;display:inline-block;"></i><i style="width:14px;height:6px;background:{{ ink }};border-radius:1.5px;position:absolute;margin-left:-19px;"></i></span>
        </div>
      </div>

      <!-- header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 24px 12px;flex-shrink:0;">
        <div>
          <p style="margin:0 0 2px;font-size:12px;font-weight:700;color:var(--ac);letter-spacing:.4px;text-transform:uppercase;">Step 2 of 2</p>
          <h1 style="margin:0;font-size:24px;font-weight:700;color:{{ ink }};letter-spacing:-.5px;">Set up your profile</h1>
        </div>
        <a href="Shop Home.dc.html" style="font-size:14px;font-weight:600;color:{{ muted }};text-decoration:none;">Skip</a>
      </div>

      <!-- scroll body -->
      <div class="cp-scroll" style="flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;padding-bottom:20px;">

        <!-- banner + avatar -->
        <div style="position:relative;padding:0 0 0;margin-bottom:54px;">
          <div style="position:relative;margin:0 22px;">
            <image-slot id="cp-banner" shape="rounded" radius="20" fit="cover" placeholder="Add cover banner" style="display:block;width:100%;height:140px;"></image-slot>
          </div>
          <div style="position:absolute;left:34px;bottom:-46px;">
            <div style="position:relative;width:92px;height:92px;">
              <image-slot id="cp-avatar" shape="rounded" radius="26" fit="cover" placeholder="Photo" style="display:block;width:92px;height:92px;border:4px solid {{ bg }};border-radius:30px;box-sizing:border-box;"></image-slot>
              <div style="position:absolute;right:-3px;bottom:-3px;width:30px;height:30px;border-radius:50%;background:var(--ac);border:3px solid {{ bg }};display:flex;align-items:center;justify-content:center;pointer-events:none;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="13" r="3" stroke="#fff" stroke-width="1.7"/></svg>
              </div>
            </div>
          </div>
        </div>

        <div style="padding:0 22px;">

          <!-- name -->
          <label style="display:block;margin:0 0 8px;font-size:13px;font-weight:700;color:{{ muted }};letter-spacing:.3px;text-transform:uppercase;">Shop / Your name</label>
          <input class="cp-input" value="{{ name }}" onInput="{{ setName }}" placeholder="e.g. Greenfield Traders" style="width:100%;height:52px;border:1.5px solid {{ line }};background:{{ surface }};border-radius:15px;padding:0 16px;box-sizing:border-box;font-family:inherit;font-size:15px;font-weight:600;color:{{ ink }};outline:none;margin-bottom:18px;" />

          <!-- description -->
          <label style="display:block;margin:0 0 8px;font-size:13px;font-weight:700;color:{{ muted }};letter-spacing:.3px;text-transform:uppercase;">Description</label>
          <textarea class="cp-input" value="{{ desc }}" onInput="{{ setDesc }}" placeholder="Tell buyers what you sell, since when, certifications…" style="width:100%;height:96px;border:1.5px solid {{ line }};background:{{ surface }};border-radius:15px;padding:13px 16px;box-sizing:border-box;font-family:inherit;font-size:14.5px;font-weight:500;line-height:1.5;color:{{ ink }};outline:none;resize:none;margin-bottom:18px;"></textarea>

          <!-- address -->
          <label style="display:block;margin:0 0 8px;font-size:13px;font-weight:700;color:{{ muted }};letter-spacing:.3px;text-transform:uppercase;">Address</label>
          <textarea class="cp-input" value="{{ address }}" onInput="{{ setAddress }}" placeholder="Shop no, street, area, city, PIN" style="width:100%;height:74px;border:1.5px solid {{ line }};background:{{ surface }};border-radius:15px;padding:13px 16px;box-sizing:border-box;font-family:inherit;font-size:14.5px;font-weight:500;line-height:1.5;color:{{ ink }};outline:none;resize:none;margin-bottom:24px;"></textarea>

          <!-- phones -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <label style="font-size:13px;font-weight:700;color:{{ muted }};letter-spacing:.3px;text-transform:uppercase;">Phone numbers</label>
            <span style="font-size:12px;font-weight:600;color:{{ muted }};">{{ phoneCount }} added</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:11px;">
            <sc-for list="{{ phones }}" as="ph" hint-placeholder-count="1">
              <div style="display:flex;align-items:center;gap:10px;height:52px;border:1.5px solid {{ line }};background:{{ surface }};border-radius:15px;padding:0 8px 0 14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><path d="M6.5 3h3l1.5 5-2 1.5a12 12 0 005.5 5.5l1.5-2 5 1.5v3a2 2 0 01-2 2A16 16 0 014.5 5a2 2 0 012-2z" stroke="{{ muted }}" stroke-width="1.8" stroke-linejoin="round"/></svg>
                <input class="cp-input" value="{{ ph.value }}" onInput="{{ ph.onInput }}" placeholder="+91 98xxx xxxxx" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:{{ ink }};" />
                <sc-if value="{{ ph.canRemove }}" hint-placeholder-val="{{ false }}"><button onClick="{{ ph.remove }}" style="width:34px;height:34px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="{{ muted }}" stroke-width="2" stroke-linecap="round"/></svg></button></sc-if>
              </div>
            </sc-for>
          </div>
          <button onClick="{{ addPhone }}" style="display:flex;align-items:center;gap:7px;border:1.5px dashed {{ dashLine }};background:transparent;border-radius:14px;height:46px;width:100%;justify-content:center;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:var(--ac);margin-bottom:24px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="var(--ac)" stroke-width="2.2" stroke-linecap="round"/></svg>Add another phone</button>

          <!-- emails -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <label style="font-size:13px;font-weight:700;color:{{ muted }};letter-spacing:.3px;text-transform:uppercase;">Email addresses</label>
            <span style="font-size:12px;font-weight:600;color:{{ muted }};">{{ emailCount }} added</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:11px;">
            <sc-for list="{{ emails }}" as="em" hint-placeholder-count="1">
              <div style="display:flex;align-items:center;gap:10px;height:52px;border:1.5px solid {{ line }};background:{{ surface }};border-radius:15px;padding:0 8px 0 14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><rect x="3" y="5" width="18" height="14" rx="2.5" stroke="{{ muted }}" stroke-width="1.8"/><path d="M4 7l8 6 8-6" stroke="{{ muted }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <input class="cp-input" value="{{ em.value }}" onInput="{{ em.onInput }}" placeholder="you@business.com" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:{{ ink }};" />
                <sc-if value="{{ em.canRemove }}" hint-placeholder-val="{{ false }}"><button onClick="{{ em.remove }}" style="width:34px;height:34px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="{{ muted }}" stroke-width="2" stroke-linecap="round"/></svg></button></sc-if>
              </div>
            </sc-for>
          </div>
          <button onClick="{{ addEmail }}" style="display:flex;align-items:center;gap:7px;border:1.5px dashed {{ dashLine }};background:transparent;border-radius:14px;height:46px;width:100%;justify-content:center;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:var(--ac);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="var(--ac)" stroke-width="2.2" stroke-linecap="round"/></svg>Add another email</button>

        </div>
      </div>

      <!-- footer -->
      <div style="flex-shrink:0;padding:12px 22px calc(16px + env(safe-area-inset-bottom));border-top:1px solid {{ line }};background:{{ bg }};">
        <button onClick="{{ save }}" style="{{ saveStyle }}">Save & continue</button>
      </div>

      <!-- home indicator -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:{{ ink }};opacity:.22;z-index:30;"></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1E8C57&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { name: '', desc: '', address: '', phones: [''], emails: [''] };

  renderVals() {
    const { name, desc, address, phones, emails } = this.state;
    const ac = this.props.accentColor || '#1E8C57';
    const ink = '#1A1A18', muted = '#8E8C86', surface = '#FFFFFF', bg = '#F7F6F3', line = '#E8E6E1';
    if (typeof document !== 'undefined') document.documentElement.style.setProperty('--ac', ac);

    const phoneRows = phones.map((value, i) => ({
      value,
      canRemove: phones.length > 1,
      onInput: (e) => this.setState(s => { const a = [...s.phones]; a[i] = e.target.value; return { phones: a }; }),
      remove: () => this.setState(s => ({ phones: s.phones.filter((_, j) => j !== i) })),
    }));
    const emailRows = emails.map((value, i) => ({
      value,
      canRemove: emails.length > 1,
      onInput: (e) => this.setState(s => { const a = [...s.emails]; a[i] = e.target.value; return { emails: a }; }),
      remove: () => this.setState(s => ({ emails: s.emails.filter((_, j) => j !== i) })),
    }));

    const valid = name.trim().length > 0;
    const saveStyle = 'width:100%;height:56px;border:none;border-radius:17px;font-family:inherit;font-size:16px;font-weight:700;background:' + ink + ';color:' + bg + ';' +
      (valid ? 'opacity:1;cursor:pointer;' : 'opacity:.35;cursor:not-allowed;');

    return {
      ink, muted, surface, bg, line, dashLine: '#D6D3CC',
      name, desc, address,
      setName: (e) => this.setState({ name: e.target.value }),
      setDesc: (e) => this.setState({ desc: e.target.value }),
      setAddress: (e) => this.setState({ address: e.target.value }),
      phones: phoneRows, emails: emailRows,
      phoneCount: phones.length, emailCount: emails.length,
      addPhone: () => this.setState(s => ({ phones: [...s.phones, ''] })),
      addEmail: () => this.setState(s => ({ emails: [...s.emails, ''] })),
      saveStyle,
      save: () => { if (valid) { try { location.href = 'Shop Home.dc.html'; } catch (e) {} } },
    };
  }
}
</script>
</body>
</html>
