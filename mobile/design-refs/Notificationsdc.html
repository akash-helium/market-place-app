<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .nt-scroll::-webkit-scrollbar{ display:none; }
  </style>
</helmet>
<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%, #F0EFEC 0%, #E8E7E3 60%, #E3E2DE 100%);font-family:'Plus Jakarta Sans',system-ui,sans-serif;padding:40px 0;box-sizing:border-box;">

  <div style="position:relative;width:392px;height:840px;background:#0B0B0C;border-radius:54px;padding:11px;box-shadow:0 50px 90px -30px rgba(20,20,25,.55), 0 0 0 2px rgba(0,0,0,.04), inset 0 0 0 2px rgba(255,255,255,.06);box-sizing:border-box;">
    <div style="position:relative;width:100%;height:100%;background:{{ bg }};border-radius:44px;overflow:hidden;display:flex;flex-direction:column;">

      <!-- status bar -->
      <div style="position:relative;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;flex-shrink:0;z-index:20;">
        <span style="font-size:15px;font-weight:600;color:{{ ink }};letter-spacing:.2px;">9:41</span>
        <div style="position:absolute;left:50%;top:11px;transform:translateX(-50%);width:118px;height:33px;background:#0B0B0C;border-radius:20px;"></div>
        <div style="display:flex;align-items:center;gap:7px;">
          <span style="display:flex;gap:2px;align-items:flex-end;height:11px;">
            <i style="width:3px;height:5px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:7px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:9px;background:{{ ink }};border-radius:1px;display:block;"></i>
            <i style="width:3px;height:11px;background:{{ ink }};border-radius:1px;display:block;"></i>
          </span>
          <span style="display:inline-flex;align-items:center;"><i style="width:23px;height:11px;border:1.5px solid {{ ink }};border-radius:3px;display:inline-block;"></i><i style="width:14px;height:6px;background:{{ ink }};border-radius:1.5px;position:absolute;margin-left:-19px;"></i></span>
        </div>
      </div>

      <!-- header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 24px 14px;flex-shrink:0;">
        <div>
          <h1 style="margin:0;font-size:26px;font-weight:700;color:{{ ink }};letter-spacing:-.6px;">Notifications</h1>
          <p style="margin:3px 0 0;font-size:13px;font-weight:500;color:{{ muted }};">{{ unreadLabel }}</p>
        </div>
        <button onClick="{{ markAll }}" style="font-size:13px;font-weight:700;color:{{ markColor }};background:none;border:none;font-family:inherit;cursor:pointer;padding:8px 0;">Mark all read</button>
      </div>

      <!-- list -->
      <div class="nt-scroll" style="flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;padding:0 18px 20px;">
        <sc-for list="{{ groups }}" as="g" hint-placeholder-count="2">
          <p style="margin:8px 6px 8px;font-size:12px;font-weight:700;color:{{ muted }};letter-spacing:.4px;text-transform:uppercase;">{{ g.label }}</p>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
            <sc-for list="{{ g.items }}" as="n" hint-placeholder-count="3">
              <button onClick="{{ n.read }}" style="{{ n.cardStyle }}">
                <span style="width:44px;height:44px;border-radius:13px;background:{{ n.iconBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;">{{ n.icon }}</span>
                <div style="flex:1;min-width:0;text-align:left;">
                  <p style="margin:0 0 3px;font-size:14.5px;font-weight:700;color:{{ ink }};line-height:1.25;">{{ n.title }}</p>
                  <p style="margin:0;font-size:13px;font-weight:500;color:{{ muted }};line-height:1.4;">{{ n.body }}</p>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;">
                  <span style="font-size:11.5px;font-weight:600;color:{{ muted }};white-space:nowrap;">{{ n.time }}</span>
                  <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ false }}"><span style="width:9px;height:9px;border-radius:50%;background:var(--ac);"></span></sc-if>
                </div>
              </button>
            </sc-for>
          </div>
        </sc-for>
      </div>

      <!-- ===== BOTTOM TAB BAR ===== -->
      <div style="flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-around;padding:9px 14px calc(16px + env(safe-area-inset-bottom));border-top:1px solid {{ line }};background:{{ surface }};">
        <a href="Shop Home.dc.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6 8 6v8a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1v-8z" stroke="{{ muted }}" stroke-width="1.9" stroke-linejoin="round"/></svg>
          <span style="font-size:11px;font-weight:600;color:{{ muted }};">Home</span>
        </a>
        <a href='/notifications.dc' style='display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;'>
          <span style="position:relative;display:flex;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z" stroke="var(--ac)" stroke-width="1.9" stroke-linejoin="round"/><path d="M10 19a2 2 0 004 0" stroke="var(--ac)" stroke-width="1.9" stroke-linecap="round"/></svg><span style="position:absolute;top:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#E5484D;border:1.5px solid {{ surface }};"></span></span>
          <span style="font-size:11px;font-weight:700;color:var(--ac);">Alerts</span>
        </a>
        <a href="List Product.dc.html" style="display:flex;flex-direction:column;align-items:center;flex:1;text-decoration:none;">
          <span style="width:46px;height:46px;border-radius:16px;background:var(--ac);display:flex;align-items:center;justify-content:center;margin-top:-12px;box-shadow:0 10px 20px -6px var(--ac-soft);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg></span>
          <span style="font-size:11px;font-weight:600;color:{{ muted }};margin-top:3px;">List</span>
        </a>
        <a href="Seller Profile.dc.html?s=0" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8.5" r="3.5" stroke="{{ muted }}" stroke-width="1.9"/><path d="M5 20c0-3.5 3-5.5 7-5.5s7 2 7 5.5" stroke="{{ muted }}" stroke-width="1.9" stroke-linecap="round"/></svg>
          <span style="font-size:11px;font-weight:600;color:{{ muted }};">Profile</span>
        </a>
      </div>

      <!-- home indicator -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:{{ ink }};opacity:.22;z-index:30;"></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1E8C57&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { read: {} };

  data = [
    { group: 'Today', items: [
      { id: 'n1', type: 'order', title: 'New order received', body: 'Order #4821 · 3 items · ₹540', time: '12m' },
      { id: 'n2', type: 'query', title: 'Buyer query on Premium Basmati', body: 'Rahul asked about bulk pricing', time: '40m' },
      { id: 'n3', type: 'payout', title: 'Payout credited', body: '₹12,480 settled to your bank', time: '2h' },
    ] },
    { group: 'This week', items: [
      { id: 'n4', type: 'review', title: 'New 5-star review', body: '"Fresh and fast delivery" — Meera', time: '1d' },
      { id: 'n5', type: 'stock', title: 'Low stock alert', body: 'Toor Dal is down to 4 units left', time: '2d' },
      { id: 'n6', type: 'system', title: 'Pricing tip', body: 'Lower Sona Masoori by ₹10 to rank higher', time: '3d' },
    ] },
  ];

  // notifications unread by default unless in state.read
  iconFor(type, ac) {
    const S = ac;
    const W = 21, H = 21;
    const wrap = (children) => React.createElement('svg', { width: W, height: H, viewBox: '0 0 24 24', fill: 'none' }, children);
    const path = (d, extra) => React.createElement('path', Object.assign({ key: Math.random(), d, stroke: S, strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none' }, extra || {}));
    const map = {
      order: [ path('M6 6h15l-1.5 8.5a2 2 0 01-2 1.7H9.2a2 2 0 01-2-1.6L5.2 4H3'), React.createElement('circle', { key: 'a', cx: 9.5, cy: 20, r: 1.3, fill: S }), React.createElement('circle', { key: 'b', cx: 17, cy: 20, r: 1.3, fill: S }) ],
      query: [ path('M4 5h16a1 1 0 011 1v9a1 1 0 01-1 1H9l-4 4v-4H4a1 1 0 01-1-1V6a1 1 0 011-1z') ],
      payout: [ React.createElement('circle', { key: 'c', cx: 12, cy: 12, r: 9, stroke: S, strokeWidth: 1.9, fill: 'none' }), path('M14.5 9.2c-.6-.7-1.6-1.1-2.7-1.1-1.7 0-2.8.9-2.8 2.1 0 2.9 5.8 1.4 5.8 4.3 0 1.3-1.2 2.2-3 2.2-1.2 0-2.3-.5-2.9-1.2') ],
      review: [ path('M12 3l2.6 5.7 6.2.6-4.7 4.2 1.4 6.1L12 16.9 6.5 19.6l1.4-6.1L3.2 9.3l6.2-.6L12 3z') ],
      stock: [ path('M21 8l-9-5-9 5 9 5 9-5z'), path('M3 8v8l9 5 9-5V8'), path('M12 13v8') ],
      system: [ React.createElement('circle', { key: 'd', cx: 12, cy: 12, r: 9, stroke: S, strokeWidth: 1.9, fill: 'none' }), path('M12 8h.01'), path('M11 12h1v4h1') ],
    };
    return wrap(map[type] || map.system);
  }

  renderVals() {
    const { read } = this.state;
    const ac = this.props.accentColor || '#1E8C57';
    const ink = '#1A1A18', muted = '#8E8C86', surface = '#FFFFFF', bg = '#F7F6F3', line = '#E8E6E1';
    if (typeof document !== 'undefined') {
      document.documentElement.style.setProperty('--ac', ac);
      document.documentElement.style.setProperty('--ac-soft', ac + '66');
    }

    const typeBg = { order: ac + '18', query: ac + '18', payout: '#E7F4EC', review: '#FBF1DC', stock: '#FBE9E3', system: '#ECEAE5' };
    const typeColor = { order: ac, query: ac, payout: '#1F8A5B', review: '#B8851E', stock: '#C0573A', system: '#6B6862' };

    let unreadCount = 0;
    const groups = this.data.map(grp => ({
      label: grp.group,
      items: grp.items.map(it => {
        const unread = !read[it.id];
        if (unread) unreadCount++;
        return {
          ...it,
          unread,
          icon: this.iconFor(it.type, typeColor[it.type] || ink),
          iconBg: typeBg[it.type] || '#ECEAE5',
          read: () => this.setState(s => ({ read: { ...s.read, [it.id]: true } })),
          cardStyle: 'display:flex;align-items:center;gap:13px;width:100%;border:1.5px solid ' + (unread ? ac + '33' : line) + ';background:' + (unread ? ac + '0d' : surface) + ';border-radius:18px;padding:13px;cursor:pointer;font-family:inherit;',
        };
      }),
    }));

    return {
      ink, muted, surface, bg, line,
      groups,
      unreadLabel: unreadCount > 0 ? unreadCount + ' unread' : 'You\u2019re all caught up',
      markColor: unreadCount > 0 ? ac : muted,
      markAll: () => this.setState({ read: { n1: true, n2: true, n3: true, n4: true, n5: true, n6: true } }),
    };
  }
}
</script>
</body>
</html>
